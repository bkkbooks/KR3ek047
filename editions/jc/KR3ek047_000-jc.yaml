body:
  text: 正文疥瘡肝氣勝脾氣衰肌肉不榮也風邪甚則土衰而少陽之氣侵於肌肉為瘡瘍也其名有四一曰濕瘡水泡也二曰砂瘡撓瘡也三曰膿窠瘡黃泡瘡也四曰坐板瘡膿窠瘡之見於臀部者也熱客於皮則皮起故成泡也皮起則津液注之故泡中有水也風甚則津液干故化蟲也熱淫肌肉則水泡成膿也蟲之行深入肌肉亦成膿窠也風侵於肌則土氣不行津液凝堅故肉粟起腳焮赤成砂疥也津凝於肌風以燥之亦成蟲疥也砂疥之變為蟲疥成膿窠者風熱甚內淫肌肉也濕疥宜燥濕祛風砂疥宜祛風蟲疥宜除熱祛風殺蟲膿窠宜祛風平肝補土益氣坐板宜祛風平肝滋陰瀉濕膿窠坐板之潰者宜溫肌肉問曰熱何以成水泡風何以成撓瘡曰皮者肺也熱客於皮金不勝火則皮與肌離而成泡也風則不能傷皮故肌粟起肌粟起邪傷脾也疥之生也始於手足十指延及遍身始上於頭頸手足為諸陽之本脈之所發也邪傷脈而後正氣傷瘡瘍乃生也頭者諸陽之會精明之所聚也正氣衰邪氣甚而後頭面生瘡也凡瘡即自頭面始者無害自四肢而及頭面者難治風邪客於玄府則汗液不宣砂疥於是生砂疥形如細砂焮赤抓之有水邪氣尚淺瘰癧未生肌肉未熱故不痛而癢脈浮數按之微弦荊羌散主之風為木木畏金故皮不生泡也木剋土故肉粟起如細砂也風客玄府玄府之肌受傷正氣不行故硬也邪自外來為時尚暫故肌肉不熱也癢者風加於肌也不痛者肌肉未傷也脈浮者風也數者火也微弦將傷脾也芥穗羌活祛風清肌人參甘草益氣補脾也荊羌散方芥穗一兩羌活八錢人參八錢甘草八錢熱加於皮膚則玄府突起成泡皮起則津液注之而有水脈浮數荊羌散加蒼朮八錢薄荷八錢主之浮者風也數者熱也泡起皮薄邪氣輕淺不必服藥泡起皮硬邪重入深不治必成膿窠故用荊羌散加薄荷以祛皮膚之熱蒼朮燥皮膚之濕玄府者所以出津液也風客之則津液團結風久客則蘊熱團結之津液因化蟲也荊羌散加藜蘆主之砂疥無泡分肉之間津液自凝也癢甚抓之不休者有蟲也殺其蟲則愈不殺則傷肌肉成膿窠也風熱不去則水泡之濕蘊為蟲也始近皮膚繼入肌肉如蚓之蝕土旋井而居旋井者盤旋蹲踞蝕肌成井也荊羌散加蘆薈八錢蕪荑八錢主之旋井者必成膿窠也挑之蟲去亦愈矣脈數躁孫絡有熱也瘰癧起癢甚而痛荊羌散加生地一兩枯草八錢主之邪熱雖盛肌肉未浸淫也脈數躁營氣熱故加生地肝木己剋土故加枯草脈浮大邪侵肌肉也見瘰癧熱甚脹痛焮赤抓之有水尚未成膿也薄荷枯草湯主之瘰癧起肝勝脾傷也抓之有水風動水湧也薄荷枯草湯方薄荷一兩枯草八錢荊芥八錢炙草八錢脈洪數熱痛煩躁見瘰癧薄荷枯草湯加生地八錢連翹八錢主之此營熱而肝氣勝也煩躁者心煩也營氣熱則心亦不寧也益其血則煩去矣脈弦大不浮膚鞭不作膿微熱時脹痛蒼朮當歸湯主之弦者邪侵肌肉也大者邪氣進也不作膿者肉氣衰不能作膿也補其脾益其氣斯膿作矣蒼朮當歸湯方蒼朮八分當歸六分芥穗六分羌活五分枯草五分炙草八分人參六分膚硬作小粟紅焮癢甚水流不止瘰癧雖見不痛者荊羌散加生耆八分主之脈必弦細脾氣虛邪氣盛也風熱加故癢脾氣虛故水為風所湧也脈弦細膿不成膚鞭水泡時作蒼朮當歸湯加生耆五錢主之弦乾邪深入也細者正氣衰也邪者風熱也正氣者肌肉之氣也肌肉之氣衰何以脈細內有分理分理之際津液之所輸也飲食入胃其氣傳脾及肺蒸於肌肉注於孫絡今邪淫肌肉則脈無所養故細也脈細者外祛其邪內補其胃氣也脈細瘰癧瘻水不作肌肉清者過服涼劑也炙草枯草湯主之過服涼劑肝氣乍平猶未除也胃氣則已傷矣故水雖不作瘰癧猶見而肌肉清也炙草枯草湯方炙草一兩焦術八錢生薑八錢枯草八錢人參八錢瘰癧脹痛肌熱膿黃破之脹少減須臾腹脹薄荷枯草湯加膽草八錢主之瘰脹肌熱斯膿黃而膿窠瘡成矣膿窠瘡者素問之膿瘡也病膿窠者正氣勝不治久亦愈也過涼胃氣則脈變弦細而難愈也破之脹減須臾復脹者肝氣勝而肌肉之氣強也膿潰脹消脈減洪數蒼朮銀花湯主之膿潰脹消邪氣衰服此湯則痂脫而愈矣蒼朮銀花湯方蒼朮一兩白芷八錢銀花一兩炙草八錢枯草八錢脈弦膿黃不流膚硬者蒼朮當歸湯加生耆六錢主之瘡久糜爛水液湧出脈細弱者生耆川芎湯主之羊肉湯亦可瘡久糜爛肌氣衰津液不注脈而風又動之故湧出也生耆川芎湯方生耆一兩川芎一兩蒼朮八錢炙草八錢枯草八錢白芷八錢酒芍六錢生薑六錢水止痂結當服蒼朮銀花湯也其不結痂而水止膚如紫癜形者仍當服生耆川芎湯去酒芍也凡瘡初已數服蒼朮銀花湯則瘡不復作矣肌肉糜爛水液湧出者浴以銀花九里光樗樹皮山胡椒葉甘草節湯也敷以一掃光塗以黃郎中膏黃郎中膏者以黃郎中樹皮去粗皮搗以豬膏以布盛之炙熱塗之也大便燥者木邪侮土胃燥也薄荷枯草湯加膽草六錢枳殼六錢大黃六錢主之坐板瘡即膿瘡之生臀部者也脈沉大臀肉硬如豆大微癢獨活生地湯主之木氣下攻則生板瘡臀為諸水所聚水性寒故臀膿初生不成泡也邪客肌腠土氣不行故硬如豆大也微癢者風熱臨水則勢減故癢不甚而微也獨活生地湯方獨活八錢生地一兩二錢地榆七錢炙草八錢荊芥八錢熱脹而癢抓之有水見瘰癧脈沉弦者膽草生地湯主之熱脹者瘡熱脹也熱脹則肝勝肝勝則瘰癧見也膽草生地湯方膽草七錢生地一兩獨活八錢地榆八錢枯草八錢瘰癧脹痛瘡大脹作膿脈沉滑膽草生地湯加地骨皮天丁主之排膿潰爛瘰癧消者熟地銀花湯主之排膿潰爛毒氣出也瘰癧消肝氣衰將結痂也祛其風滋其陰溫其肌肉則愈矣熟地銀花湯方熟地一兩銀花一兩炙草一兩枯草八錢獨活八錢蛇床子八錢瘰癧消痂結不熱瘡將愈也熟地銀花湯主之初生脈弦細者獨活生地人參湯主之初生脈弦細者腎氣衰也肝氣勝也獨活生地人參湯方獨活一兩人參一兩生地一兩炙草八錢荊芥八錢水流不止不成膿脈沉細者膽草芥穗湯主之瘰癧堅者加天丁六錢膽草芥穗湯方膽草八錢芥穗一兩獨活八錢熟地一兩人參八錢蒼朮八錢膚腫而癢水不止者乳香芥穗湯主之乳香芥穗湯方乳香一兩芥穗一兩膽草八錢天丁七錢枯草八錢熟地一兩蒼朮八錢脈沉細小便白瘡腫熟地肉桂湯主之小便不利者亦主之小便白下焦寒也小便不利真氣不化病久關元衰冷也熟地肉桂湯方熟地一兩肉桂三錢膽草七錢枯草八錢人參八錢茯苓八錢獨活八錢芥穗八錢熱甚瘰癧脹大便不通脈洪大者生地膽草湯加地骨皮天丁大黃枳殼主之大便不通者臀部之熱熏直腸致直腸有熱也金鑑曰坐板瘡名風疳初宜芫花川椒黃柏熬湯燙洗即消或毒盛癢痛仍不止者宜用油缸青布三指寬一條香油調雄黃末一錢攤於布上卷之燃著吹滅火頭向瘡烘之其癢痛即止水止痂落膚尚硬者服蒼朮銀花湯去白芷加熟地獨活當歸也水流不止強敷以藥水止必成水病下部腫小便不利也當平其肝利其水乳香芥穗湯主之強敷以藥謂強以生肌散等敷之涼藥外錮水氣內伏固腫也水由肝勝而湧故平肝則水蓄當瀉也若上為喘飲食減少頭面皆腫則難治芫花乳香湯主之芫花乳香湯方芫花七錢乳香七錢膽草六錢枯草六錢蒼朮六錢熟地六錢獨活六錢凡瘡家必嗜飲食邪助少陽胃消食也不嗜飲食者中氣衰邪風勝也炙草枯草湯主之瘡作醫不外清其肌熱而反以寒藥下之則邪入里瘡即己煩躁口渴小便黃者小柴胡湯除半夏加羌活生地枳殼主之瘡復出者以瘡法治之不出不嗜飲食者難治壯熱進飲食大便硬小便不黃者大承氣湯主之外敷瘡藥瘡巳下為疳蝕陰者苦參地榆湯主之苦參地榆湯方苦參一兩膽草一兩地偷八錢生地一兩枯草八錢
